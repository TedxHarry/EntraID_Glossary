<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Directory Cover - Premium</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f0f0;
            min-height: 100vh;
        }
        svg {
            max-width: 100%;
            height: auto;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" width="1200" height="675">
        <!-- Gradient definitions - 2024 PREMIUM TRENDS -->
        <defs>
            <!-- PREMIUM: Soft golden beige to deep ocean blue (calm discovery & professional polish) -->
            <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#e8dcc8;stop-opacity:1" />
                <stop offset="40%" style="stop-color:#c9b5a0;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#1a4d5e;stop-opacity:1" />
            </linearGradient>
            
            <!-- Warm golden glow -->
            <radialGradient id="warmGlow" cx="30%" cy="30%" r="50%">
                <stop offset="0%" style="stop-color:#f5e6d3;stop-opacity:0.6" />
                <stop offset="100%" style="stop-color:#d4a574;stop-opacity:0.05" />
            </radialGradient>
            
            <!-- Deep blue accent glow -->
            <radialGradient id="deepBlueGlow" cx="70%" cy="70%" r="55%">
                <stop offset="0%" style="stop-color:#4a9fb5;stop-opacity:0.4" />
                <stop offset="100%" style="stop-color:#0f5f7f;stop-opacity:0.05" />
            </radialGradient>
            
            <!-- Text glow for premium effect -->
            <filter id="textGlow">
                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
            
            <!-- Soft shadow -->
            <filter id="softGlow">
                <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <!-- Premium gradient background -->
        <rect width="1200" height="675" fill="url(#bgGradient)"/>
        
        <!-- Subtle glow overlays -->
        <circle cx="150" cy="150" r="350" fill="url(#warmGlow)" opacity="0.7"/>
        <circle cx="1050" cy="550" r="380" fill="url(#deepBlueGlow)" opacity="0.6"/>

        <!-- MINIMALIST MODERN DESIGN: Abstract soft shapes -->
        <!-- Left floating element -->
        <g opacity="0.4">
            <circle cx="120" cy="200" r="120" fill="none" stroke="#1a4d5e" stroke-width="2"/>
            <circle cx="120" cy="200" r="85" fill="none" stroke="#4a9fb5" stroke-width="1.5" opacity="0.6"/>
            <circle cx="120" cy="200" r="50" fill="none" stroke="#d4a574" stroke-width="1" opacity="0.5"/>
        </g>

        <!-- Right floating element -->
        <g opacity="0.4">
            <circle cx="1080" cy="520" r="130" fill="none" stroke="#d4a574" stroke-width="2"/>
            <circle cx="1080" cy="520" r="95" fill="none" stroke="#4a9fb5" stroke-width="1.5" opacity="0.6"/>
            <circle cx="1080" cy="520" r="55" fill="none" stroke="#1a4d5e" stroke-width="1" opacity="0.5"/>
        </g>

        <!-- Subtle line elements -->
        <g opacity="0.35" stroke="#1a4d5e" stroke-width="1.5">
            <line x1="200" y1="80" x2="600" y2="80"/>
            <line x1="600" y1="595" x2="1000" y2="595"/>
            <line x1="100" y1="250" x2="100" y2="450"/>
            <line x1="1100" y1="150" x2="1100" y2="350"/>
        </g>

        <!-- ==================== PREMIUM TEXT CONTENT - HIGH CONTRAST ==================== -->
        
        <!-- TOP SECTION -->
        <g>
            <!-- Main title: "Entra ID - Foundational Concepts" (56px) - WHITE for contrast -->
            <text x="600" y="88" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5" stroke="#1a4d5e" stroke-width="0.5" opacity="0.95">Entra ID <tspan fill="#ffd700" font-weight="600" stroke="none">-</tspan> Foundational Concepts</text>
            
            <!-- Series number: "Glossary #1.5" (32px) - BRIGHT GOLD -->
            <text x="600" y="130" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="600" fill="#ffd700" text-anchor="middle" letter-spacing="1.5" opacity="0.95">Glossary #1.5</text>
        </g>

        <!-- MIDDLE SECTION - MAIN CONTENT -->
        <g>
            <!-- "ACTIVE DIRECTORY" (110px) - PURE WHITE for maximum readability -->
            <text x="600" y="415" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="110" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2.5" stroke="#1a4d5e" stroke-width="0.8" opacity="0.98" filter="url(#textGlow)">Active Directory</text>
            
            <!-- Subtitle caption (38px) - BRIGHT GOLD for accent -->
            <text x="600" y="490" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="38" font-weight="300" fill="#ffd700" text-anchor="middle" letter-spacing="1" opacity="0.95">The foundation of on-premises identity</text>
        </g>

        <!-- BOTTOM RIGHT SIGNATURE - WHITE for contrast -->
        <g>
            <!-- TedxHarry in white -->
            <text x="1120" y="633" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="end" letter-spacing="0.5" opacity="0.92">TedxHarry</text>
        </g>

        <!-- DIFFICULTY BADGE - GOLD outline and text -->
        <g opacity="0.95">
            <rect x="50" y="618" width="160" height="42" rx="21" fill="none" stroke="#ffd700" stroke-width="2.5"/>
            <text x="130" y="648" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="600" fill="#ffd700" text-anchor="middle">🟢 Beginner</text>
        </g>

    </svg>
</body>
</html>
