<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entra ID Tenant Cover</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f0f0;
            min-height: 100vh;
        }
        svg {
            max-width: 100%;
            height: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" width="1200" height="675">
        <!-- Gradient definitions -->
        <defs>
            <!-- VIBRANT PURPLE/INDIGO GRADIENT BACKGROUND (Completely unique) -->
            <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#1e0a4f;stop-opacity:1" />
                <stop offset="30%" style="stop-color:#2d1b6b;stop-opacity:1" />
                <stop offset="60%" style="stop-color:#3d1f7a;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#1a0d3f;stop-opacity:1" />
            </linearGradient>
            
            <!-- Vibrant purple glow -->
            <radialGradient id="purpleGlow" cx="50%" cy="50%" r="60%">
                <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.45" />
                <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.05" />
            </radialGradient>
            
            <!-- Pink/magenta accent glow -->
            <radialGradient id="magentaGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.35" />
                <stop offset="100%" style="stop-color:#be185d;stop-opacity:0.05" />
            </radialGradient>
            
            <!-- Bright cyan accent glow -->
            <radialGradient id="brightCyanGlow" cx="50%" cy="50%" r="55%">
                <stop offset="0%" style="stop-color:#06f6d6;stop-opacity:0.3" />
                <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.05" />
            </radialGradient>
            
            <!-- Text glow filter -->
            <filter id="textGlow">
                <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
            
            <!-- Node glow filter -->
            <filter id="nodeGlow">
                <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <!-- Dark purple gradient background -->
        <rect width="1200" height="675" fill="url(#bgGradient)"/>
        
        <!-- Premium glow layers with purple, magenta, and cyan -->
        <circle cx="100" cy="120" r="350" fill="url(#purpleGlow)" opacity="0.5"/>
        <circle cx="1100" cy="580" r="380" fill="url(#magentaGlow)" opacity="0.42"/>
        <circle cx="600" cy="338" r="320" fill="url(#brightCyanGlow)" opacity="0.15"/>

        <!-- LEFT SIDE BUILDING FLOORS CONCEPT: Vertical stacked elements -->
        <g opacity="0.8">
            <!-- Vertical lines representing building -->
            <line x1="80" y1="100" x2="80" y2="600" stroke="#a78bfa" stroke-width="3" opacity="0.7"/>
            <line x1="120" y1="100" x2="120" y2="600" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
            
            <!-- Floor segments -->
            <rect x="40" y="150" width="120" height="40" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.6"/>
            <rect x="40" y="280" width="120" height="40" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>
            <rect x="40" y="410" width="120" height="40" fill="none" stroke="#06f6d6" stroke-width="2" opacity="0.6"/>
            
            <!-- Accent dots on building -->
            <circle cx="100" cy="170" r="4" fill="#ec4899" filter="url(#nodeGlow)"/>
            <circle cx="100" cy="300" r="4" fill="#a78bfa" filter="url(#nodeGlow)"/>
            <circle cx="100" cy="430" r="4" fill="#06f6d6" filter="url(#nodeGlow)"/>
        </g>

        <!-- RIGHT SIDE BUILDING FLOORS CONCEPT: Vertical stacked elements -->
        <g opacity="0.8">
            <!-- Vertical lines representing building -->
            <line x1="1120" y1="100" x2="1120" y2="600" stroke="#a78bfa" stroke-width="3" opacity="0.7"/>
            <line x1="1080" y1="100" x2="1080" y2="600" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
            
            <!-- Floor segments -->
            <rect x="1040" y="150" width="120" height="40" fill="none" stroke="#06f6d6" stroke-width="2" opacity="0.6"/>
            <rect x="1040" y="280" width="120" height="40" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.6"/>
            <rect x="1040" y="410" width="120" height="40" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>
            
            <!-- Accent dots on building -->
            <circle cx="1100" cy="170" r="4" fill="#06f6d6" filter="url(#nodeGlow)"/>
            <circle cx="1100" cy="300" r="4" fill="#ec4899" filter="url(#nodeGlow)"/>
            <circle cx="1100" cy="430" r="4" fill="#a78bfa" filter="url(#nodeGlow)"/>
        </g>

        <!-- CENTER: MAIN TENANT CONCEPT - Building/Floor representation -->
        <g>
            <!-- Central tenant building -->
            <rect x="480" y="280" width="240" height="140" fill="none" stroke="#a78bfa" stroke-width="4" opacity="0.9" filter="url(#nodeGlow)"/>
            
            <!-- Interior divisions (floors within tenant) -->
            <line x1="480" y1="315" x2="720" y2="315" stroke="#ec4899" stroke-width="2" opacity="0.7"/>
            <line x1="480" y1="350" x2="720" y2="350" stroke="#06f6d6" stroke-width="2" opacity="0.7"/>
            <line x1="480" y1="385" x2="720" y2="385" stroke="#a78bfa" stroke-width="2" opacity="0.7"/>
            
            <!-- Interior grid (windows/rooms) -->
            <line x1="545" y1="280" x2="545" y2="420" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
            <line x1="610" y1="280" x2="610" y2="420" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
            <line x1="675" y1="280" x2="675" y2="420" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
            
            <!-- Accent circles in tenant -->
            <circle cx="510" cy="298" r="3.5" fill="#06f6d6" opacity="0.8"/>
            <circle cx="590" cy="330" r="3.5" fill="#ec4899" opacity="0.8"/>
            <circle cx="650" cy="368" r="3.5" fill="#a78bfa" opacity="0.8"/>
            <circle cx="690" cy="400" r="3.5" fill="#06f6d6" opacity="0.8"/>
        </g>

        <!-- Connecting lines from ecosystem buildings to central tenant -->
        <g stroke="#a78bfa" stroke-width="1.5" opacity="0.4" fill="none" stroke-dasharray="6,4">
            <path d="M 160 170 Q 320 220 480 300"/>
            <path d="M 160 430 Q 320 380 480 370"/>
            <path d="M 1040 170 Q 880 220 720 300"/>
            <path d="M 1040 430 Q 880 380 720 370"/>
        </g>

        <!-- Decorative accent elements -->
        <g opacity="0.6">
            <line x1="150" y1="50" x2="1050" y2="50" stroke="#a78bfa" stroke-width="3"/>
            <line x1="180" y1="65" x2="1020" y2="65" stroke="#ec4899" stroke-width="1.5"/>
            
            <line x1="150" y1="625" x2="1050" y2="625" stroke="#06f6d6" stroke-width="3"/>
            <line x1="180" y1="640" x2="1020" y2="640" stroke="#a78bfa" stroke-width="1.5"/>
        </g>

        <!-- Geometric decorative circles -->
        <g opacity="0.5">
            <circle cx="200" cy="600" r="30" fill="none" stroke="#ec4899" stroke-width="2.5"/>
            <circle cx="1000" cy="110" r="26" fill="none" stroke="#06f6d6" stroke-width="2.5"/>
        </g>

        <!-- ==================== TEXT CONTENT WITH EXCELLENT CONTRAST ==================== -->
        
        <!-- TOP SECTION -->
        <g>
            <!-- Decorative line above -->
            <line x1="200" y1="55" x2="1000" y2="55" stroke="#a78bfa" stroke-width="3.5" opacity="0.85"/>
            
            <!-- Main title: "Entra ID - Foundational Concepts" (56px) -->
            <text x="600" y="88" font-family="'Segoe UI', -apple-system, sans-serif" font-size="56" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">Entra ID <tspan fill="#06f6d6" font-weight="700">-</tspan> Foundational Concepts</text>
            
            <!-- Series number: "Glossary #1.3" (28px) -->
            <text x="600" y="130" font-family="'Segoe UI', -apple-system, sans-serif" font-size="28" font-weight="600" fill="#a78bfa" text-anchor="middle" letter-spacing="1.5">Glossary #1.3</text>
            
            <!-- Decorative line below -->
            <line x1="250" y1="150" x2="950" y2="150" stroke="#ec4899" stroke-width="2.5" opacity="0.75"/>
        </g>

        <!-- MIDDLE SECTION - MAIN CONTENT WITH PROPER SPACING -->
        <g>
            <!-- Premium separator -->
            <line x1="300" y1="270" x2="900" y2="270" stroke="#06f6d6" stroke-width="4" opacity="0.85"/>
            <circle cx="600" cy="270" r="7" fill="#ec4899" opacity="0.85"/>
            
            <!-- "TENANT" (140px) - MASSIVE MAIN TEXT -->
            <text x="600" y="410" font-family="'Segoe UI', -apple-system, sans-serif" font-size="140" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-3" filter="url(#textGlow)">TENANT</text>
            
            <!-- Subtitle: "Your organization's isolated instance" (36px) -->
            <text x="600" y="490" font-family="'Segoe UI', -apple-system, sans-serif" font-size="36" font-weight="300" fill="#06f6d6" text-anchor="middle" letter-spacing="1.5">Your organization's isolated instance</text>
        </g>

        <!-- BOTTOM RIGHT SIGNATURE - Moved up to avoid edge -->
        <g>
            <circle cx="1065" cy="618" r="5.5" fill="#a78bfa" opacity="0.95"/>
            <text x="1120" y="633" font-family="'Segoe UI', -apple-system, sans-serif" font-size="28" font-weight="700" fill="#06f6d6" text-anchor="end" letter-spacing="0.5">TedxHarry</text>
        </g>

        <!-- DIFFICULTY BADGE -->
        <g opacity="0.9">
            <rect x="50" y="618" width="160" height="42" rx="21" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
            <text x="130" y="648" font-family="'Segoe UI', -apple-system, sans-serif" font-size="20" font-weight="600" fill="#a78bfa" text-anchor="middle">🟢 Beginner</text>
        </g>

    </svg>
</body>
</html>
