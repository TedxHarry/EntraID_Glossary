<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Entra Product Family Cover</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f0f0;
            min-height: 100vh;
        }
        svg {
            max-width: 100%;
            height: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" width="1200" height="675">
        <!-- Gradient definitions -->
        <defs>
            <!-- RICH DEEP TEAL/EMERALD GRADIENT BACKGROUND (Premium, sophisticated) -->
            <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#0f2f3f;stop-opacity:1" />
                <stop offset="35%" style="stop-color:#1a4d5c;stop-opacity:1" />
                <stop offset="65%" style="stop-color:#0f3f4d;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#162838;stop-opacity:1" />
            </linearGradient>
            
            <!-- Emerald glow -->
            <radialGradient id="emeraldGlow" cx="50%" cy="50%" r="60%">
                <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.4" />
                <stop offset="100%" style="stop-color:#059669;stop-opacity:0.05" />
            </radialGradient>
            
            <!-- Cyan accent glow -->
            <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.35" />
                <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.05" />
            </radialGradient>
            
            <!-- Text glow filter -->
            <filter id="textGlow">
                <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
            
            <!-- Node glow filter -->
            <filter id="nodeGlow">
                <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <!-- Dark teal gradient background -->
        <rect width="1200" height="675" fill="url(#bgGradient)"/>
        
        <!-- Premium glow layers with emerald and cyan -->
        <circle cx="80" cy="80" r="320" fill="url(#emeraldGlow)" opacity="0.45"/>
        <circle cx="1120" cy="620" r="350" fill="url(#cyanGlow)" opacity="0.35"/>
        <circle cx="600" cy="338" r="300" fill="url(#emeraldGlow)" opacity="0.12"/>

        <!-- LEFT SIDE ECOSYSTEM: Dynamic flowing paths -->
        <g opacity="0.75">
            <path d="M 30 200 Q 120 240 220 300" stroke="#10b981" stroke-width="3" fill="none" stroke-dasharray="8,5"/>
            <path d="M 60 450 Q 150 400 280 350" stroke="#06b6d4" stroke-width="3" fill="none" stroke-dasharray="8,5"/>
            <circle cx="60" cy="200" r="8" fill="#10b981" filter="url(#nodeGlow)"/>
            <circle cx="90" cy="480" r="7" fill="#06b6d4" filter="url(#nodeGlow)"/>
            <rect x="40" y="320" width="11" height="11" fill="#14b8a6" opacity="0.9"/>
        </g>

        <!-- RIGHT SIDE ECOSYSTEM: Dynamic flowing paths -->
        <g opacity="0.75">
            <path d="M 1170 200 Q 1080 240 980 300" stroke="#14b8a6" stroke-width="3" fill="none" stroke-dasharray="8,5"/>
            <path d="M 1140 450 Q 1050 400 920 350" stroke="#10b981" stroke-width="3" fill="none" stroke-dasharray="8,5"/>
            <circle cx="1140" cy="200" r="8" fill="#14b8a6" filter="url(#nodeGlow)"/>
            <circle cx="1110" cy="480" r="7" fill="#10b981" filter="url(#nodeGlow)"/>
            <rect x="1150" y="320" width="11" height="11" fill="#06b6d4" opacity="0.9"/>
        </g>

        <!-- CENTRAL PRODUCT ECOSYSTEM: 5 nodes radiating -->
        <g>
            <!-- Central hub -->
            <circle cx="600" cy="338" r="42" fill="#10b981" filter="url(#nodeGlow)" opacity="0.88"/>
            <circle cx="600" cy="338" r="34" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.7"/>
            
            <!-- Top product node -->
            <circle cx="600" cy="170" r="15" fill="#10b981" filter="url(#nodeGlow)"/>
            <line x1="600" y1="378" x2="600" y2="185" stroke="#10b981" stroke-width="2" opacity="0.55"/>
            
            <!-- Top right product node -->
            <circle cx="765" cy="230" r="15" fill="#14b8a6" filter="url(#nodeGlow)"/>
            <line x1="635" y1="360" x2="750" y2="245" stroke="#14b8a6" stroke-width="2" opacity="0.55"/>
            
            <!-- Bottom right product node -->
            <circle cx="755" cy="445" r="15" fill="#06b6d4" filter="url(#nodeGlow)"/>
            <line x1="630" y1="368" x2="740" y2="460" stroke="#06b6d4" stroke-width="2" opacity="0.55"/>
            
            <!-- Bottom left product node -->
            <circle cx="445" cy="445" r="15" fill="#14b8a6" filter="url(#nodeGlow)"/>
            <line x1="570" y1="368" x2="460" y2="460" stroke="#14b8a6" stroke-width="2" opacity="0.55"/>
            
            <!-- Top left product node -->
            <circle cx="435" cy="230" r="15" fill="#06b6d4" filter="url(#nodeGlow)"/>
            <line x1="565" y1="360" x2="450" y2="245" stroke="#06b6d4" stroke-width="2" opacity="0.55"/>
        </g>

        <!-- Decorative accent lines -->
        <g opacity="0.6">
            <line x1="150" y1="50" x2="1050" y2="50" stroke="#10b981" stroke-width="3"/>
            <line x1="180" y1="65" x2="1020" y2="65" stroke="#06b6d4" stroke-width="1.5"/>
            
            <line x1="150" y1="625" x2="1050" y2="625" stroke="#14b8a6" stroke-width="3"/>
            <line x1="180" y1="640" x2="1020" y2="640" stroke="#10b981" stroke-width="1.5"/>
        </g>

        <!-- Geometric decorative elements -->
        <g opacity="0.5">
            <circle cx="180" cy="600" r="28" fill="none" stroke="#06b6d4" stroke-width="2.5"/>
            <circle cx="1020" cy="120" r="24" fill="none" stroke="#10b981" stroke-width="2.5"/>
        </g>

        <!-- ==================== TEXT CONTENT WITH PROPER CONTRAST ==================== -->
        
        <!-- TOP SECTION -->
        <g>
            <!-- Decorative line above -->
            <line x1="200" y1="55" x2="1000" y2="55" stroke="#10b981" stroke-width="3.5" opacity="0.8"/>
            
            <!-- Main title: "Entra ID - Foundational Concepts" (56px) -->
            <text x="600" y="88" font-family="'Segoe UI', -apple-system, sans-serif" font-size="56" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">Entra ID <tspan fill="#06b6d4" font-weight="700">-</tspan> Foundational Concepts</text>
            
            <!-- Series number: "Glossary #1.2" (28px) -->
            <text x="600" y="130" font-family="'Segoe UI', -apple-system, sans-serif" font-size="28" font-weight="600" fill="#10b981" text-anchor="middle" letter-spacing="1.5">Glossary #1.2</text>
            
            <!-- Decorative line below -->
            <line x1="250" y1="150" x2="950" y2="150" stroke="#06b6d4" stroke-width="2.5" opacity="0.7"/>
        </g>

        <!-- MIDDLE SECTION - MAIN CONTENT WITH PROPER SPACING -->
        <g>
            <!-- "Microsoft Entra" (68px) -->
            <text x="600" y="260" font-family="'Segoe UI', -apple-system, sans-serif" font-size="68" font-weight="700" fill="#10b981" text-anchor="middle" letter-spacing="2.5" filter="url(#textGlow)">Microsoft Entra</text>
            
            <!-- Premium separator line -->
            <line x1="300" y1="290" x2="900" y2="290" stroke="#06b6d4" stroke-width="4" opacity="0.85"/>
            <circle cx="600" cy="290" r="7" fill="#14b8a6" opacity="0.85"/>
            
            <!-- "PRODUCT FAMILY" (130px) - REDUCED FOR FIT -->
            <text x="600" y="430" font-family="'Segoe UI', -apple-system, sans-serif" font-size="130" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-3" filter="url(#textGlow)">PRODUCT FAMILY</text>
            
            <!-- Subtitle: "Why there's more than just Entra ID" (38px) -->
            <text x="600" y="520" font-family="'Segoe UI', -apple-system, sans-serif" font-size="38" font-weight="300" fill="#06b6d4" text-anchor="middle" letter-spacing="1.5">Why there's more than just Entra ID</text>
        </g>

        <!-- BOTTOM RIGHT SIGNATURE - MOVED UP TO AVOID CUTOFF -->
        <g>
            <circle cx="1065" cy="643" r="5.5" fill="#10b981" opacity="0.95"/>
            <text x="1120" y="658" font-family="'Segoe UI', -apple-system, sans-serif" font-size="28" font-weight="700" fill="#06b6d4" text-anchor="end" letter-spacing="0.5">TedxHarry</text>
        </g>

        <!-- DIFFICULTY BADGE -->
        <g opacity="0.9">
            <rect x="50" y="618" width="160" height="42" rx="21" fill="none" stroke="#10b981" stroke-width="2.5"/>
            <text x="130" y="648" font-family="'Segoe UI', -apple-system, sans-serif" font-size="20" font-weight="600" fill="#10b981" text-anchor="middle">🟢 Beginner</text>
        </g>

    </svg>
</body>
</html>
