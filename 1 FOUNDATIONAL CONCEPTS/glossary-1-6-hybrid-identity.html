<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Identity Cover</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f0f0;
            min-height: 100vh;
        }
        svg {
            max-width: 100%;
            height: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" width="1200" height="675">
        <!-- Gradient definitions - 2025 LUXURY TREND -->
        <defs>
            <!-- PREMIUM: Emerald Green to Warm Coral (jewel tone luxury) -->
            <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#0f3a2f;stop-opacity:1" />
                <stop offset="35%" style="stop-color:#1d5f4f;stop-opacity:1" />
                <stop offset="65%" style="stop-color:#c85a4a;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#e67e50;stop-opacity:1" />
            </linearGradient>
            
            <!-- Emerald glow -->
            <radialGradient id="emeraldGlow" cx="20%" cy="20%" r="60%">
                <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.5" />
                <stop offset="100%" style="stop-color:#059669;stop-opacity:0.05" />
            </radialGradient>
            
            <!-- Coral glow -->
            <radialGradient id="coralGlow" cx="80%" cy="80%" r="60%">
                <stop offset="0%" style="stop-color:#fb923c;stop-opacity:0.45" />
                <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.05" />
            </radialGradient>
            
            <!-- Text glow -->
            <filter id="textGlow">
                <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <!-- Premium emerald to coral gradient -->
        <rect width="1200" height="675" fill="url(#bgGradient)"/>
        
        <!-- Glow overlays -->
        <circle cx="100" cy="100" r="420" fill="url(#emeraldGlow)" opacity="0.6"/>
        <circle cx="1100" cy="600" r="450" fill="url(#coralGlow)" opacity="0.55"/>

        <!-- LEFT SIDE: Organic flowing bridge shapes (hybrid concept) -->
        <g opacity="0.65">
            <path d="M 60 150 Q 100 180 140 220 T 220 300" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.7"/>
            <path d="M 80 250 Q 120 280 160 310 T 240 380" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.55"/>
            
            <circle cx="90" cy="160" r="8" fill="#ffffff" opacity="0.8"/>
            <circle cx="180" cy="290" r="6" fill="#ffffff" opacity="0.7"/>
            <circle cx="250" cy="360" r="5" fill="#ffffff" opacity="0.6"/>
        </g>

        <!-- RIGHT SIDE: Organic flowing bridge shapes -->
        <g opacity="0.65">
            <path d="M 1140 150 Q 1100 180 1060 220 T 980 300" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.7"/>
            <path d="M 1120 250 Q 1080 280 1040 310 T 960 380" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.55"/>
            
            <circle cx="1110" cy="160" r="8" fill="#ffffff" opacity="0.8"/>
            <circle cx="1020" cy="290" r="6" fill="#ffffff" opacity="0.7"/>
            <circle cx="950" cy="360" r="5" fill="#ffffff" opacity="0.6"/>
        </g>

        <!-- CENTER: Hybrid fusion elements (two paths meeting) -->
        <g opacity="0.8">
            <!-- Main fusion shape -->
            <path d="M 480 200 Q 550 250 600 300 Q 650 250 720 200" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.85" filter="url(#textGlow)"/>
            <path d="M 480 500 Q 550 450 600 400 Q 650 450 720 500" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.85" filter="url(#textGlow)"/>
            
            <!-- Connection point -->
            <circle cx="600" cy="350" r="12" fill="#ffffff" filter="url(#textGlow)" opacity="0.9"/>
            <circle cx="600" cy="350" r="7" fill="#10b981" opacity="0.7"/>
            
            <!-- Accent points -->
            <circle cx="480" cy="350" r="6" fill="#fb923c" opacity="0.75"/>
            <circle cx="720" cy="350" r="6" fill="#10b981" opacity="0.75"/>
        </g>

        <!-- Subtle decorative lines -->
        <g opacity="0.4" stroke="#ffffff" stroke-width="1.5">
            <line x1="200" y1="60" x2="1000" y2="60"/>
            <line x1="200" y1="615" x2="1000" y2="615"/>
        </g>

        <!-- ==================== PREMIUM TEXT - HIGH CONTRAST ==================== -->
        
        <!-- TOP SECTION -->
        <g>
            <!-- Main title: "Entra ID - Foundational Concepts" (56px) - PURE WHITE -->
            <text x="600" y="88" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5" opacity="0.98">Entra ID <tspan fill="#fbbf24" font-weight="600">-</tspan> Foundational Concepts</text>
            
            <!-- Series number: "Glossary #1.6" (32px) - BRIGHT GOLD -->
            <text x="600" y="130" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="600" fill="#fbbf24" text-anchor="middle" letter-spacing="1.5" opacity="0.96">Glossary #1.6</text>
        </g>

        <!-- MIDDLE SECTION - MAIN CONTENT -->
        <g>
            <!-- "HYBRID IDENTITY" (110px) - PURE WHITE with glow -->
            <text x="600" y="415" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="110" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2.5" filter="url(#textGlow)" opacity="0.99">Hybrid Identity</text>
            
            <!-- Subtitle: caption (38px) - BRIGHT GOLD -->
            <text x="600" y="490" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="38" font-weight="300" fill="#fbbf24" text-anchor="middle" letter-spacing="1" opacity="0.96">Bridging cloud and on-premises</text>
        </g>

        <!-- BOTTOM RIGHT SIGNATURE - WHITE -->
        <g>
            <!-- TedxHarry -->
            <text x="1120" y="633" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="end" letter-spacing="0.5" opacity="0.94">TedxHarry</text>
        </g>

        <!-- DIFFICULTY BADGE - GOLD -->
        <g opacity="0.96">
            <rect x="50" y="618" width="160" height="42" rx="21" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
            <text x="130" y="648" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="600" fill="#fbbf24" text-anchor="middle">🟢 Beginner</text>
        </g>

    </svg>
</body>
</html>
