<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microsoft Entra ID Glossary</title>
  <meta name="description" content="A comprehensive, experience-driven glossary of Microsoft Entra ID concepts — 189 terms across 13 topic areas.">
  <link rel="icon" href="https://learn.microsoft.com/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Dark theme base -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <style>
    /* ── Palette ─────────────────────────────────────────────────────── */
    :root {
      --bg-primary:    #0f1117;
      --bg-secondary:  #161b22;
      --bg-card:       #1c2128;
      --bg-hover:      #21262d;
      --border:        #30363d;
      --accent:        #388bfd;
      --accent-light:  #58a6ff;
      --accent-glow:   rgba(56,139,253,0.2);
      --text-primary:  #e6edf3;
      --text-secondary:#8b949e;
      --text-muted:    #6e7681;
      --green:         #3fb950;
      --yellow:        #d29922;
      --red:           #f85149;
      --purple:        #bc8cff;
      --sidebar-width: 320px;
      --theme-color:   #388bfd;
    }

    /* ── Base ────────────────────────────────────────────────────────── */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    /* ── Sidebar ─────────────────────────────────────────────────────── */
    .sidebar {
      background: var(--bg-secondary) !important;
      border-right: 1px solid var(--border) !important;
    }

    .sidebar > h1 {
      font-size: 0.95rem !important;
      font-weight: 700 !important;
      color: var(--accent-light) !important;
      padding: 1.2rem 1.4rem 1rem !important;
      border-bottom: 1px solid var(--border) !important;
      margin: 0 !important;
      background: var(--bg-card) !important;
      letter-spacing: 0.02em;
    }

    .sidebar > h1 a { color: inherit !important; }

    /* Section label (bold items in sidebar) */
    .sidebar-nav ul li > p,
    .sidebar-nav ul li strong {
      display: block;
      font-size: 0.67rem !important;
      font-weight: 600 !important;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent) !important;
      padding: 0.85rem 1.4rem 0.25rem !important;
      margin: 0 !important;
    }

    .sidebar-nav ul li a {
      font-size: 0.82rem !important;
      color: var(--text-secondary) !important;
      padding: 0.28rem 1.4rem !important;
      display: block;
      border-left: 2px solid transparent;
      transition: all 0.15s;
      line-height: 1.45;
    }

    .sidebar-nav ul li a:hover {
      color: var(--accent-light) !important;
      background: var(--bg-hover) !important;
      border-left-color: var(--accent);
      text-decoration: none !important;
    }

    .sidebar-nav ul li a.active {
      color: var(--accent-light) !important;
      background: var(--accent-glow) !important;
      border-left-color: var(--accent-light);
      font-weight: 500;
    }

    /* Search */
    .search { padding: 0.8rem 1rem !important; background: var(--bg-secondary) !important; border-bottom: 1px solid var(--border) !important; }
    .search input {
      border-radius: 6px !important;
      border: 1px solid var(--border) !important;
      background: var(--bg-card) !important;
      color: var(--text-primary) !important;
      font-family: inherit !important;
      font-size: 0.84rem !important;
      padding: 0.45rem 0.9rem !important;
      width: 100% !important;
    }
    .search input:focus {
      border-color: var(--accent) !important;
      outline: none !important;
      box-shadow: 0 0 0 3px var(--accent-glow) !important;
    }
    .search input::placeholder { color: var(--text-muted) !important; }

    /* ── Main content area ───────────────────────────────────────────── */
    .content { background: var(--bg-primary) !important; }

    .markdown-section {
      max-width: 840px !important;
      padding: 2.5rem 3rem !important;
      color: var(--text-primary) !important;
      font-size: 1rem !important;
      line-height: 1.85 !important;
    }

    /* ── Article H1: Term name ───────────────────────────────────────── */
    .markdown-section h1 {
      font-size: 2.3rem !important;
      font-weight: 700 !important;
      color: var(--accent-light) !important;
      border-bottom: 2px solid var(--accent) !important;
      padding-bottom: 0.35em !important;
      margin-bottom: 0.1em !important;
      line-height: 1.2 !important;
      letter-spacing: -0.01em;
    }

    /* Subtitle — em paragraph right after h1 */
    .markdown-section h1 + p {
      margin-top: 0.3rem !important;
      margin-bottom: 2rem !important;
    }
    .markdown-section h1 + p > em {
      font-size: 1.05rem !important;
      color: var(--text-secondary) !important;
      font-style: italic !important;
    }

    /* ── Section headings ────────────────────────────────────────────── */
    .markdown-section h2 {
      font-size: 1.3rem !important;
      font-weight: 600 !important;
      color: #c9d1d9 !important;
      border-bottom: 1px solid var(--border) !important;
      padding-bottom: 0.35em !important;
      margin-top: 2.5rem !important;
    }

    .markdown-section h3 {
      font-size: 1.05rem !important;
      font-weight: 600 !important;
      color: #c9d1d9 !important;
    }

    /* ── Body text ───────────────────────────────────────────────────── */
    .markdown-section p { color: var(--text-primary) !important; }

    /* ── Bold — clearly visible ──────────────────────────────────────── */
    .markdown-section strong {
      color: #79c0ff !important;
      font-weight: 700 !important;
    }

    /* ── Italic ──────────────────────────────────────────────────────── */
    .markdown-section em { color: #cba6f7 !important; }

    /* ── Links ───────────────────────────────────────────────────────── */
    .markdown-section a {
      color: var(--accent-light) !important;
      text-decoration: none !important;
      border-bottom: 1px solid transparent !important;
      transition: border-color 0.15s !important;
    }
    .markdown-section a:hover { border-bottom-color: var(--accent-light) !important; }

    /* ── Blockquotes ─────────────────────────────────────────────────── */
    .markdown-section blockquote {
      border-left: 3px solid var(--accent) !important;
      background: var(--bg-card) !important;
      padding: 0.9em 1.3em !important;
      border-radius: 0 6px 6px 0 !important;
      color: #a8b5c5 !important;
      margin: 1.5rem 0 !important;
    }
    .markdown-section blockquote p { color: inherit !important; margin: 0 !important; }

    /* ── Horizontal rule ─────────────────────────────────────────────── */
    .markdown-section hr {
      border: none !important;
      border-top: 1px solid var(--border) !important;
      margin: 2rem 0 !important;
    }

    /* ── Code ────────────────────────────────────────────────────────── */
    .markdown-section code {
      background: var(--bg-card) !important;
      color: #ff7b72 !important;
      border: 1px solid var(--border) !important;
      border-radius: 4px !important;
      padding: 0.15em 0.45em !important;
      font-size: 0.87em !important;
    }

    .markdown-section pre {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
    }

    /* ── Tables ──────────────────────────────────────────────────────── */
    .markdown-section table {
      border-collapse: collapse !important;
      width: 100% !important;
      margin: 1.5rem 0 !important;
      border-radius: 8px !important;
      overflow: hidden !important;
    }
    .markdown-section thead th {
      background: var(--bg-card) !important;
      color: var(--accent-light) !important;
      font-weight: 600 !important;
      padding: 0.75rem 1rem !important;
      border-bottom: 2px solid var(--border) !important;
      text-align: left !important;
      font-size: 0.85rem !important;
      text-transform: uppercase !important;
      letter-spacing: 0.05em !important;
    }
    .markdown-section tbody tr {
      border-bottom: 1px solid var(--border) !important;
      transition: background 0.1s !important;
    }
    .markdown-section tbody tr:hover { background: var(--bg-hover) !important; }
    .markdown-section tbody td {
      padding: 0.65rem 1rem !important;
      color: var(--text-primary) !important;
      font-size: 0.93rem !important;
    }

    /* ── Nav bar at bottom of articles ──────────────────────────────── */
    .article-nav {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      padding: 0.75rem 1.2rem !important;
      margin-top: 2rem !important;
      font-size: 0.88rem !important;
      gap: 0.5rem !important;
    }
    .article-nav a {
      color: var(--accent-light) !important;
      border-bottom: none !important;
      font-weight: 500 !important;
      white-space: nowrap !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
      max-width: 40% !important;
    }
    .article-nav a:hover { text-decoration: underline !important; }

    /* ── Signature ───────────────────────────────────────────────────── */
    .markdown-section blockquote:has(em > strong) {
      border-left-color: var(--purple) !important;
      background: rgba(188, 140, 255, 0.07) !important;
      color: var(--purple) !important;
    }

    /* ── Cover page ──────────────────────────────────────────────────── */
    section.cover {
      background: linear-gradient(135deg, #0d1117 0%, #0f1b2d 40%, #0e2a5c 100%) !important;
    }
    .cover-main { color: var(--text-primary) !important; }
    .cover-main h1 {
      font-size: 3rem !important;
      font-weight: 700 !important;
      color: var(--accent-light) !important;
      margin-bottom: 0.3em !important;
      border: none !important;
    }
    .cover-main blockquote {
      background: transparent !important;
      border: none !important;
      color: var(--text-secondary) !important;
      font-size: 1.1rem !important;
      padding: 0 !important;
      margin: 0.5rem 0 2rem !important;
    }
    .cover-main p:last-child a {
      border-radius: 6px !important;
      padding: 0.7rem 1.8rem !important;
      font-weight: 600 !important;
      font-size: 0.95rem !important;
      transition: opacity 0.2s !important;
    }
    .cover-main p:last-child a:first-child {
      background: var(--accent) !important;
      color: #fff !important;
      border: none !important;
    }
    .cover-main p:last-child a:last-child {
      background: transparent !important;
      color: var(--accent-light) !important;
      border: 1px solid var(--accent) !important;
      margin-left: 0.5rem !important;
    }
    .cover-main p:last-child a:hover { opacity: 0.85 !important; }

    /* ── Badges (shields.io) in README ──────────────────────────────── */
    .markdown-section img[src*="shields.io"] {
      margin: 0.2rem !important;
    }

    /* ── Progress bar ────────────────────────────────────────────────── */
    #nprogress .bar { background: var(--accent-light) !important; height: 3px !important; }
    #nprogress .peg { box-shadow: 0 0 10px var(--accent-light), 0 0 5px var(--accent-light) !important; }

    /* ── Mobile ──────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .markdown-section { padding: 1.5rem !important; }
      .markdown-section h1 { font-size: 1.8rem !important; }
      .article-nav { flex-direction: column !important; text-align: center !important; }
      .article-nav a { max-width: 100% !important; }
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'Entra ID Glossary',
      repo: 'TedxHarry/EntraID_Glossary',
      homepage: 'README.md',
      coverpage: '_coverpage.md',
      onlyCover: false,
      loadSidebar: '_sidebar.md',
      subMaxLevel: 1,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search 189 terms...',
        noData: 'No results found.',
        depth: 4,
      },
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            document.querySelectorAll('.markdown-section p').forEach(function(p) {
              var t = p.textContent;
              if (t.includes('←') || t.includes('→') || t.includes('🏠')) {
                p.classList.add('article-nav');
              }
            });
          });
        }
      ]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-progress@1/dist/progress.min.js"></script>
</body>
</html>
