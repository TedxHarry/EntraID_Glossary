<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microsoft Entra ID Glossary</title>
  <meta name="description" content="A comprehensive, experience-driven glossary of Microsoft Entra ID concepts — 189 terms across 13 topic areas.">
  <link rel="icon" href="https://learn.microsoft.com/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* ── Base ──────────────────────────────────────────────────────── */
    :root {
      --theme-color: #0078d4;
      --sidebar-width: 320px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Sidebar ───────────────────────────────────────────────────── */
    .sidebar {
      background: #f8f9fc;
      border-right: 1px solid #e8edf2;
    }

    .sidebar > h1 {
      font-size: 1rem;
      font-weight: 700;
      color: #0078d4;
      padding: 1.2rem 1.5rem 0.8rem;
      border-bottom: 1px solid #e8edf2;
      margin: 0;
    }

    .sidebar > h1 a {
      color: inherit;
    }

    .sidebar-nav {
      padding: 0.5rem 0;
    }

    /* Section headers in sidebar (bold items) */
    .sidebar-nav ul li strong {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #0078d4;
      padding: 0.9rem 1.5rem 0.3rem;
      margin-top: 0.3rem;
    }

    .sidebar-nav ul li a {
      font-size: 0.82rem;
      color: #4a5568;
      padding: 0.25rem 1.5rem;
      display: block;
      border-radius: 0;
      transition: background 0.15s, color 0.15s;
      line-height: 1.4;
    }

    .sidebar-nav ul li a:hover,
    .sidebar-nav ul li a.active {
      color: #0078d4;
      background: #e8f3fc;
      text-decoration: none;
    }

    /* Search box */
    .search input {
      border-radius: 6px;
      border: 1px solid #d1dbe8;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.5rem 0.9rem;
      background: #fff;
    }

    .search input:focus {
      border-color: #0078d4;
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,120,212,0.15);
    }

    /* ── Content area ──────────────────────────────────────────────── */
    .content {
      padding-top: 0;
    }

    .markdown-section {
      max-width: 820px;
      padding: 3rem 3.5rem;
      font-size: 1rem;
      line-height: 1.8;
      color: #2d3748;
    }

    /* ── Article header: Term + Subtitle ───────────────────────────── */
    .markdown-section h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #0078d4;
      border-bottom: 3px solid #0078d4;
      padding-bottom: 0.3em;
      margin-bottom: 0.1em;
      line-height: 1.2;
    }

    /* Subtitle — the <em> paragraph immediately after h1 */
    .markdown-section h1 + p {
      margin-top: 0.3rem;
      margin-bottom: 2rem;
    }

    .markdown-section h1 + p > em {
      font-size: 1.05rem;
      color: #718096;
      font-style: italic;
      font-weight: 400;
    }

    /* ── Section headings ───────────────────────────────────────────── */
    .markdown-section h2 {
      font-size: 1.35rem;
      font-weight: 600;
      color: #1a202c;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 0.4em;
      margin-top: 2.5rem;
    }

    .markdown-section h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #2d3748;
    }

    /* ── Links ──────────────────────────────────────────────────────── */
    .markdown-section a {
      color: #0078d4;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }

    .markdown-section a:hover {
      border-bottom-color: #0078d4;
    }

    /* ── Blockquotes ────────────────────────────────────────────────── */
    .markdown-section blockquote {
      border-left: 4px solid #0078d4;
      background: #f0f7ff;
      padding: 1em 1.4em;
      border-radius: 0 6px 6px 0;
      color: #2c4a6e;
      margin: 1.5rem 0;
    }

    .markdown-section blockquote p {
      margin: 0;
    }

    /* ── Horizontal rule ────────────────────────────────────────────── */
    .markdown-section hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 2rem 0;
    }

    /* ── Bold labels ────────────────────────────────────────────────── */
    .markdown-section strong {
      color: #1a202c;
      font-weight: 600;
    }

    /* ── Code ───────────────────────────────────────────────────────── */
    .markdown-section code {
      background: #edf2f7;
      color: #c7254e;
      border-radius: 4px;
      padding: 0.15em 0.4em;
      font-size: 0.88em;
    }

    /* ── Bottom navigation bar ──────────────────────────────────────── */
    .article-nav {
      display: flex !important;
      justify-content: space-between;
      align-items: center;
      background: #f8f9fc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.8rem 1.2rem;
      margin-top: 2rem;
      font-size: 0.88rem;
      gap: 1rem;
    }

    .article-nav a {
      color: #0078d4 !important;
      border-bottom: none !important;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 38%;
    }

    .article-nav a:hover {
      text-decoration: underline;
    }

    /* ── Cover page ─────────────────────────────────────────────────── */
    section.cover {
      background: linear-gradient(135deg, #003f7f 0%, #0078d4 60%, #00a1e0 100%) !important;
    }

    .cover-main {
      color: #fff;
    }

    .cover-main h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.3em;
      border: none;
    }

    .cover-main blockquote {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.85);
      font-size: 1.1rem;
      padding: 0;
      margin: 0.5rem 0 2rem;
    }

    .cover-main p:last-child a {
      border-radius: 6px;
      padding: 0.7rem 1.8rem;
      font-weight: 600;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }

    .cover-main p:last-child a:first-child {
      background: #fff;
      color: #0078d4 !important;
      border: none;
    }

    .cover-main p:last-child a:last-child {
      background: rgba(255,255,255,0.15);
      color: #fff !important;
      border: 1px solid rgba(255,255,255,0.4);
      margin-left: 0.5rem;
    }

    .cover-main p:last-child a:hover {
      opacity: 0.85;
    }

    /* Cover background overlay */
    .cover.show ~ .sidebar,
    .cover.show ~ .content {
      display: none;
    }

    /* ── Progress bar ───────────────────────────────────────────────── */
    #nprogress .bar {
      background: #0078d4 !important;
      height: 3px;
    }

    #nprogress .peg {
      box-shadow: 0 0 10px #0078d4, 0 0 5px #0078d4 !important;
    }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .markdown-section {
        padding: 1.5rem;
      }

      .markdown-section h1 {
        font-size: 1.7rem;
      }

      .article-nav {
        flex-direction: column;
        text-align: center;
      }

      .article-nav a {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'Entra ID Glossary',
      repo: 'TedxHarry/EntraID_Glossary',
      homepage: 'README.md',
      coverpage: '_coverpage.md',
      onlyCover: false,
      loadSidebar: '_sidebar.md',
      subMaxLevel: 1,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search 189 terms...',
        noData: 'No results found.',
        depth: 4,
      },
      plugins: [
        // Style the prev/next navigation bar
        function(hook) {
          hook.doneEach(function() {
            document.querySelectorAll('.markdown-section p').forEach(function(p) {
              if (p.textContent.includes('←') || p.textContent.includes('→')) {
                p.classList.add('article-nav');
              }
            });
          });
        }
      ]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-progress@1/dist/progress.min.js"></script>
</body>
</html>
